function pad(n){ return String(n).padStart(2,"0"); }
function addDays(s,n){ const d=new Date(s); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; }
function addMonths(s,n){ const d=new Date(s); d.setMonth(d.getMonth()+n); return d.toISOString().split("T")[0]; }
function weekOf(base){ const d=new Date(base),sun=new Date(d); sun.setDate(d.getDate()-d.getDay()); return Array.from({length:7},(_,i)=>{ const x=new Date(sun); x.setDate(sun.getDate()+i); return x.toISOString().split("T")[0]; }); }
function monthGrid(y,m){ const first=new Date(y,m,1),last=new Date(y,m+1,0),cells=[]; for(let i=0;i<first.getDay();i++) cells.push(null); for(let d=1;d<=last.getDate();d++) cells.push(y+"-"+pad(m+1)+"-"+pad(d)); return cells; }
function makeRecurring(base,gid){ if(!base.recur||base.recur==="none") return []; const monthly=base.recur==="monthly",count=monthly?6:12; let cur=base.date; const res=[]; for(let i=1;i<=count;i++){ cur=monthly?addMonths(cur,1):addDays(cur,base.recur==="weekly"?7:14); res.push({...base,id:gid+"_r"+i,date:cur,recurGroupId:gid}); } return res; }
function money(amount,curId){ const c=CUR(curId); return c.symbol+Number(amount||0).toLocaleString(); }

// מודל: כל תשלום ידני שסכומו גדול ממחיר הפגישה מייצר "עודף" שנכנס לארנק הקרדיט.
// הארנק צובע פגישות "ממתין" לפי סדר כרונולוגי (הישנות קודם), כל פגישה פעם אחת בלבד.
async function settleClientArrays(cat, evsArr){
  const price=Number(cat.sessionPrice)||0;
  if(price<=0){ return; } // בלי מחיר פגישה אין ניהול קרדיט
  const mine=evsArr.filter(e=>e.category===cat.id);
  // שלב 0: איפוס — כל פגישה ששולמה מקרדיט חוזרת ל"ממתין" כדי לחשב מאפס (מונע כפילויות/שאריות)
  for(const e of mine){
    if(e.fromCredit){ e.payment="pending"; e.fromCredit=false; await sb.from("events").update({payment:"pending",from_credit:false}).eq("id",e.id); }
  }
  // שלב 1: חישוב הארנק — עודף שנוצר מתשלומים ידניים (amount>price) על פגישות ששולמו
  let wallet=0;
  for(const e of mine){
    const amt=Number(e.amount)||0;
    if(e.payment==="paid" && amt>price){ wallet+=(amt-price); }
  }
  // שלב 2: צביעת פגישות ממתינות מהארנק לפי סדר כרונולוגי
  const pend=mine.filter(e=>e.payment==="pending")
                 .sort((a,b)=>a.date.localeCompare(b.date)||(a.time||"").localeCompare(b.time||""));
  for(const e of pend){
    if(wallet>=price){
      wallet-=price;
      e.payment="paid"; e.fromCredit=true;
      await sb.from("events").update({payment:"paid",from_credit:true}).eq("id",e.id);
    } else break;
  }
  // שלב 3: שמירת יתרת הארנק
  const finalCredit=Math.max(wallet,0);
  cat.credit=finalCredit;
  await sb.from("categories").update({credit_balance:finalCredit}).eq("id",cat.id);
}

async function loadAll(uid){
  setLoading(true);
  try{
    const [prof,cats,evs,pcs]=await Promise.all([
      sb.from("profiles").select("*").eq("id",uid).single(),
      sb.from("categories").select("*").order("created_at"),
      sb.from("events").select("*").order("event_date"),
      sb.from("punch_cards").select("*").order("created_at"),
    ]);
    if(prof.data){ setUserType(prof.data.user_type); setLang(prof.data.language||"he"); setDefCur(prof.data.default_currency||"ILS"); setTutSeen(!!prof.data.tutorial_seen); }
    else { setTutSeen(false); setPickedType(false); }
    let catsArr=(cats.data||[]).map(c=>({id:c.id,label:c.label,emoji:c.emoji,color:c.color,kind:c.kind||"client",sessionPrice:Number(c.session_price||0),credit:Number(c.credit_balance||0)}));
    let evsArr=(evs.data||[]).map(dbToEvent);
    let punchArr=(pcs.data||[]).map(dbToPunch);
    // --- ניקוב כרטיסיות לאירועים שהתרחשו (פעם אחת לכל אירוע) ---
    const t=today();
    const toPunch=evsArr.filter(e=>!e.applied && e.date<=t).sort((a,b)=>a.date.localeCompare(b.date));
    for(const ev of toPunch){
      const ap=punchArr.find(p=>p.category===ev.category&&(p.used||0)<p.total);
      if(ap){ ap.used=(ap.used||0)+1; await sb.from("punch_cards").update({used:ap.used}).eq("id",ap.id); }
      ev.applied=true;
      await sb.from("events").update({applied:true}).eq("id",ev.id);
    }
    // --- יישוב חשבון קרדיט לכל לקוח (דטרמיניסטי, ללא כפילויות) ---
    for(const cat of catsArr){
      if((cat.kind||"client")!=="client") continue;
      await settleClientArrays(cat,evsArr);
    }
    setCategories(catsArr);
    _cats=catsArr;
    setEvents(evsArr);
    setPunches(punchArr);
  }catch(err){ console.error("load error",err); }
  setLoading(false);
}

async function settleClientState(catId){
  if(!catId) return;
  const cat=(_cats||categories).find(c=>c.id===catId);
  if(!cat || (cat.kind||"client")!=="client" || !(cat.sessionPrice>0)) return;
  // מושכים את המצב העדכני מהדאטה בייס כדי לחשב נכון
  const {data:evRows}=await sb.from("events").select("*").eq("category_id",catId);
  const evsArr=(evRows||[]).map(dbToEvent);
  const catObj={...cat};
  await settleClientArrays(catObj,evsArr);
  // עדכון ה-state המקומי
  setCategories(cs=>cs.map(c=>c.id===catId?{...c,credit:catObj.credit}:c));
  setEvents(es=>es.map(e=>{ const u=evsArr.find(x=>x.id===e.id); return u?{...e,payment:u.payment,fromCredit:u.fromCredit}:e; }));
  if(_cats){ const i=_cats.findIndex(c=>c.id===catId); if(i>=0) _cats[i]={..._cats[i],credit:catObj.credit}; }
}
async function applyPunchForNew(ev){
  if(!ev||!ev.category||ev.applied)return;
  const ap=punches.find(p=>p.category===ev.category&&(p.used||0)<p.total);
  if(!ap)return;
  const nu=(ap.used||0)+1;
  await sb.from("punch_cards").update({used:nu}).eq("id",ap.id);
  await sb.from("events").update({applied:true}).eq("id",ev.id);
  setPunches(ps=>ps.map(p=>p.id===ap.id?{...p,used:nu}:p));
  setEvents(es=>es.map(e=>e.id===ev.id?{...e,applied:true}:e));
}
async function deleteEvent(id){
  const ev=events.find(e=>e.id===id);
  // אם האירוע כבר נוקב בכרטיסייה (התרחש) — נבטל ניקוב אחד
  if(ev && ev.applied){
    const ap=punches.find(p=>p.category===ev.category&&(p.used||0)>0);
    if(ap){ const nu=Math.max((ap.used||0)-1,0); await sb.from("punch_cards").update({used:nu}).eq("id",ap.id); setPunches(ps=>ps.map(p=>p.id===ap.id?{...p,used:nu}:p)); }
  }
  const {error}=await sb.from("events").delete().eq("id",id); if(error){ console.error(error); return; }
  setEvents(es=>es.filter(e=>e.id!==id)); setDeleteConfirm(null); setModal(false);
  if(ev) await settleClientState(ev.category);
}

            <div style={{background:"#e0a85a11",border:"1px solid #e0a85a33",borderRadius:10,padding:"10px 12px",fontSize:12,color:"#e0a85a",marginBottom:16}}>{t.waWaiting}</div>
            <button onClick={waDisconnect} style={{width:"100%",padding:"12px",borderRadius:12,border:"1px solid #252535",background:"transparent",color:TH.textDim,cursor:"pointer",fontSize:14}}>{t.cancel}</button>
          </>
        ):(
          <>
            <div style={{fontSize:14,color:"#999",lineHeight:1.6,marginBottom:18,marginTop:6}}>{t.waDesc}</div>
            <label style={S.lbl}>{t.waPhonePh}</label>

            {waErr&&<div style={{fontSize:13,color:"#e05a5a",marginBottom:12}}>{waErr}</div>}
            <button onClick={waGenerateCode} disabled={waBusy||!waPhone.trim()} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:(waBusy||!waPhone.trim())?TH.border:"linear-gradient(135deg,#25D366,#128C7E)",color:(waBusy||!waPhone.trim())?TH.textFaint:"#fff",cursor:(waBusy||!waPhone.trim())?"default":"pointer",fontSize:15,fontWeight:700}}>{waBusy?t.authWait:t.waGetCode}</button>

</div>
);
}

function AuthScreen({lang,setLang,t,rtl}){
const [mode,setMode]=useState("login");   // login | signup | reset
const [email,setEmail]=useState("");
const [pass,setPass]=useState("");
const [busy,setBusy]=useState(false);
const [msg,setMsg]=useState(null);
const [ok,setOk]=useState(null);
const inpStyle={display:"block",width:"100%",marginBottom:10,background:TH.bg,border:"1px solid #252535",borderRadius:10,padding:"13px",color:TH.text,fontSize:16,boxSizing:"border-box",outline:"none",textAlign:rtl?"right":"left"};
function clearMsgs(){ setMsg(null); setOk(null); }
async function submit(){
  clearMsgs();
  if(!sb){ setMsg(lang==="he"?"לא ניתן להתחבר לשרת. בדקו חיבור אינטרנט ונסו שוב.":"Can't reach the server. Check your connection."); return; }
  if(mode==="reset"){ return submitReset(); }
  if(pass.length<6){ setMsg(t.authPassShort); return; }
  setBusy(true);
  try{
    if(mode==="signup"){
      const {data,error}=await sb.auth.signUp({email:email.trim(),password:pass});
      if(error){ setMsg(error.message.includes("already")?t.authBadCreds:error.message); }
      else if(data.session){ /* מחובר מיד */ }
      else { setOk(t.authCheckEmail); setMode("login"); }
    } else {
      const {error}=await sb.auth.signInWithPassword({email:email.trim(),password:pass});
      if(error){ setMsg(t.authBadCreds); }
    }
  }catch(e){ setMsg((e&&e.message?e.message:String(e))+" — "+t.authErr); }
  setBusy(false);
}
async function submitReset(){
  if(!email.trim()){ setMsg(t.authErr); return; }
  setBusy(true);
  try{
    const {error}=await sb.auth.resetPasswordForEmail(email.trim(),{redirectTo:window.location.href.split("#")[0].split("?")[0]});
    if(error){ setMsg(error.message); }
    else { setOk(t.authResetSent); }
  }catch(e){ setMsg((e&&e.message?e.message:String(e))); }
  setBusy(false);
}
const titleSub = mode==="login"?t.authLogin : mode==="signup"?t.authSignup : t.authReset;
return (
<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
  <div style={{position:"absolute",top:16,insetInlineEnd:16,display:"flex",gap:4}}>
    {["he","en"].map(lg=>(
      <button key={lg} onClick={()=>setLang(lg)} style={{padding:"7px 14px",borderRadius:11,border:`1px solid ${lang===lg?"#e6a856":TH.border}`,background:lang===lg?"#e6a85622":"transparent",color:lang===lg?"#e6a856":TH.textDim,cursor:"pointer",fontSize:15}}>{lg==="he"?"עב":"EN"}</button>
    ))}
  </div>
  <div style={{width:"min(360px,100%)",textAlign:"center"}}>
    <div style={{width:56,height:56,borderRadius:14,background:"linear-gradient(135deg,#e6a856,#d98a3e)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,marginBottom:16,marginInline:"auto"}}>✦</div>
    <div style={{fontSize:22,fontWeight:800,color:TH.text,marginBottom:6}}>{t.authTitle}</div>
    <div style={{fontSize:15,color:TH.textDim,marginBottom:mode==="reset"?16:26}}>{titleSub}</div>
    {mode==="reset"&&<div style={{fontSize:14,color:TH.textDim,marginBottom:18,lineHeight:1.5}}>{t.authResetSub}</div>}
    <input type="email" inputMode="email" autoCapitalize="none" value={email} onChange={e=>setEmail(e.target.value)} placeholder={t.authEmail} style={inpStyle}/>
    {mode!=="reset"&&(
      <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder={t.authPass} onKeyDown={e=>e.key==="Enter"&&submit()} style={{...inpStyle,marginBottom:14}}/>
    )}
    {msg&&<div style={{fontSize:14,color:"#e05a5a",marginBottom:12}}>{msg}</div>}
    {ok&&<div style={{fontSize:14,color:"#5ae09a",marginBottom:12,lineHeight:1.5}}>{ok}</div>}
    <button onClick={submit} disabled={busy||!email||(mode!=="reset"&&!pass)} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:(busy||!email||(mode!=="reset"&&!pass))?TH.border:"linear-gradient(135deg,#e6a856,#d98a3e)",color:(busy||!email||(mode!=="reset"&&!pass))?TH.textFaint:"#fff",cursor:(busy||!email||(mode!=="reset"&&!pass))?"default":"pointer",fontSize:16,fontWeight:700,marginBottom:14}}>{busy?t.authWait:(mode==="login"?t.authLoginBtn:mode==="signup"?t.authSignupBtn:t.authResetBtn)}</button>
    {mode==="login"&&(
      <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:2}}>
        <button onClick={()=>{setMode("reset");clearMsgs();}} style={{background:"none",border:"none",color:TH.textDim,cursor:"pointer",fontSize:15}}>{t.authForgot}</button>
        <button onClick={()=>{setMode("signup");clearMsgs();}} style={{background:"none",border:"none",color:"#e6a856",cursor:"pointer",fontSize:15}}>{t.authToSignup}</button>
      </div>
    )}
    {mode==="signup"&&(
      <button onClick={()=>{setMode("login");clearMsgs();}} style={{background:"none",border:"none",color:"#e6a856",cursor:"pointer",fontSize:15}}>{t.authToLogin}</button>
    )}
    {mode==="reset"&&(
      <button onClick={()=>{setMode("login");clearMsgs();}} style={{background:"none",border:"none",color:"#e6a856",cursor:"pointer",fontSize:15}}>{t.authBackToLogin}</button>
    )}
  </div>
</div>
);
}
function ResetPasswordScreen({t,rtl,onDone}){
const [pass,setPass]=useState("");
const [busy,setBusy]=useState(false);
const [msg,setMsg]=useState(null);
const [ok,setOk]=useState(false);
async function submit(){
  setMsg(null);
  if(pass.length<6){ setMsg(t.authPassShort); return; }
  setBusy(true);
  try{
    const {error}=await sb.auth.updateUser({password:pass});
    if(error){ setMsg(error.message); }
    else { setOk(true); setTimeout(()=>onDone&&onDone(),1500); }
  }catch(e){ setMsg(e&&e.message?e.message:String(e)); }
  setBusy(false);
}
const inpStyle={display:"block",width:"100%",marginBottom:14,background:TH.bg,border:"1px solid #252535",borderRadius:10,padding:"13px",color:TH.text,fontSize:16,boxSizing:"border-box",outline:"none",textAlign:rtl?"right":"left"};
return (
<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
  <div style={{width:"min(360px,100%)",textAlign:"center"}}>
    <div style={{width:56,height:56,borderRadius:14,background:"linear-gradient(135deg,#e6a856,#d98a3e)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,marginBottom:16,marginInline:"auto"}}>✦</div>
    <div style={{fontSize:22,fontWeight:800,color:TH.text,marginBottom:20}}>{t.authReset}</div>
    {ok?(
      <div style={{fontSize:16,color:"#5ae09a",lineHeight:1.6}}>{t.authPassUpdated}</div>
    ):(
      <>
        <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder={t.authNewPass} onKeyDown={e=>e.key==="Enter"&&submit()} style={inpStyle}/>
        {msg&&<div style={{fontSize:14,color:"#e05a5a",marginBottom:12}}>{msg}</div>}
        <button onClick={submit} disabled={busy||!pass} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:(busy||!pass)?TH.border:"linear-gradient(135deg,#e6a856,#d98a3e)",color:(busy||!pass)?TH.textFaint:"#fff",cursor:(busy||!pass)?"default":"pointer",fontSize:16,fontWeight:700}}>{busy?t.authWait:t.authUpdatePass}</button>
      </>
    )}
  </div>
</div>
);
}
function TutorialTour({steps,step,setStep,onClose,setView,labels,rtl}){
const s=steps[step];
const last=step===steps.length-1;
const [rect,setRect]=useState(null);
const cardRef=useRef(null);

// ודא שהלשונית הנכונה פתוחה לפני מדידה
useLayoutEffect(()=>{ if(s&&s.view) setView(s.view); },[step]);

// מדוד את מיקום אלמנט המטרה (וגלול אליו אם צריך)
useLayoutEffect(()=>{
  let raf1,raf2;
  function measure(){
    const el=document.getElementById(s.target);
    if(!el){ setRect(null); return; }
    const r=el.getBoundingClientRect();
    setRect({top:r.top,left:r.left,width:r.width,height:r.height});
  }
  // שתי פריימים: אחד שהתצוגה תתעדכן, אחד למדידה סופית
  raf1=requestAnimationFrame(()=>{ raf2=requestAnimationFrame(measure); });
  window.addEventListener("resize",measure);
  window.addEventListener("scroll",measure,true);
  return ()=>{ cancelAnimationFrame(raf1); cancelAnimationFrame(raf2); window.removeEventListener("resize",measure); window.removeEventListener("scroll",measure,true); };
},[step]);

const pad=8;
const vh=typeof window!=="undefined"?window.innerHeight:800;
const vw=typeof window!=="undefined"?window.innerWidth:400;
// החלט אם הכרטיס יופיע מתחת למטרה או מעליה
const below=rect?(rect.top+rect.height+pad+180<vh):true;
const cardTop=rect?(below?rect.top+rect.height+pad+6:Math.max(12,rect.top-pad-6-180)):0;

return (
<div style={{position:"fixed",inset:0,zIndex:400}}>
  {/* רקע מתכהה — לחיצה עליו לא סוגרת, כדי לא לבלבל */}
  <div style={{position:"absolute",inset:0,background:"#000a"}}/>
  {/* טבעת זוהרת סביב אלמנט המטרה */}
  {rect&&(
    <div style={{position:"absolute",top:rect.top-6,left:rect.left-6,width:rect.width+12,height:rect.height+12,borderRadius:14,border:"2px solid #e6a856",boxShadow:"0 0 0 9999px #000a, 0 0 22px 4px #e6a856aa",pointerEvents:"none",transition:"all .25s ease"}}/>
  )}
  {/* כרטיס ההסבר */}
  <div ref={cardRef} style={{position:"absolute",top:rect?cardTop:"50%",left:"50%",transform:rect?"translateX(-50%)":"translate(-50%,-50%)",width:"min(330px,calc(100vw - 32px))",background:TH.panel2,border:"1px solid #2a2a3a",borderRadius:18,padding:"18px 18px 16px",boxShadow:"0 12px 40px #000c",transition:"top .25s ease"}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
      <div style={{fontSize:30}}>{s.emoji}</div>
      <div style={{fontSize:17,fontWeight:800,color:TH.text}}>{s.title}</div>
    </div>
    <div style={{fontSize:15,color:TH.textDim,lineHeight:1.6,marginBottom:16}}>{s.body}</div>
    <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:14}}>
      {steps.map((_,i)=>(
        <div key={i} style={{width:i===step?20:6,height:6,borderRadius:3,background:i===step?"#e6a856":"#2a2a3a",transition:"all .25s ease"}}/>
      ))}
    </div>
    <div style={{display:"flex",gap:8,alignItems:"center"}}>
      {step>0
        ? <button onClick={()=>setStep(step-1)} style={{padding:"11px 16px",borderRadius:11,border:"1px solid #252535",background:"transparent",color:TH.textDim,cursor:"pointer",fontSize:15}}>{labels.back}</button>
        : <button onClick={onClose} style={{padding:"11px 16px",borderRadius:11,border:"none",background:"transparent",color:TH.textFaint,cursor:"pointer",fontSize:15}}>{labels.skip}</button>}
      <button onClick={()=>last?onClose():setStep(step+1)} style={{flex:1,padding:"11px",borderRadius:11,border:"none",background:"linear-gradient(135deg,#e6a856,#d98a3e)",color:"#fff",cursor:"pointer",fontSize:16,fontWeight:700}}>{last?labels.done:labels.next}</button>
    </div>
  </div>
</div>
);
}

);
