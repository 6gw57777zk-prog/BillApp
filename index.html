function today(){ const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function pad(n){ return String(n).padStart(2,"0"); }
function addDays(s,n){ const d=new Date(s); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; }
function addMonths(s,n){ const d=new Date(s); d.setMonth(d.getMonth()+n); return d.toISOString().split("T")[0]; }
function weekOf(base){ const d=new Date(base),sun=new Date(d); sun.setDate(d.getDate()-d.getDay()); return Array.from({length:7},(_,i)=>{ const x=new Date(sun); x.setDate(sun.getDate()+i); return x.toISOString().split("T")[0]; }); }
function monthGrid(y,m){ const first=new Date(y,m,1),last=new Date(y,m+1,0),cells=[]; for(let i=0;i<first.getDay();i++) cells.push(null); for(let d=1;d<=last.getDate();d++) cells.push(y+"-"+pad(m+1)+"-"+pad(d)); return cells; }
function makeRecurring(base,gid){ if(!base.recur||base.recur==="none") return []; const monthly=base.recur==="monthly",count=monthly?6:12; let cur=base.date; const res=[]; for(let i=1;i<=count;i++){ cur=monthly?addMonths(cur,1):addDays(cur,base.recur==="weekly"?7:14); res.push({...base,id:gid+"_r"+i,date:cur,recurGroupId:gid}); } return res; }
function money(amount,curId){ const c=CUR(curId); return c.symbol+Number(amount||0).toLocaleString(); }

async function loadAll(uid){
  setLoading(true);
  try{
    const [prof,cats,evs,pcs]=await Promise.all([
      sb.from("profiles").select("*").eq("id",uid).single(),
      sb.from("categories").select("*").order("created_at"),
      sb.from("events").select("*").order("event_date"),
      sb.from("punch_cards").select("*").order("created_at"),
    ]);
    if(prof.data){ setUserType(prof.data.user_type); setLang(prof.data.language||"he"); setDefCur(prof.data.default_currency||"ILS"); setTutSeen(!!prof.data.tutorial_seen); }
    else { setTutSeen(false); setPickedType(false); }
    setCategories((cats.data||[]).map(c=>({id:c.id,label:c.label,emoji:c.emoji,color:c.color,kind:c.kind||"client"})));
    _cats=(cats.data||[]).map(c=>({id:c.id,label:c.label,emoji:c.emoji,color:c.color,kind:c.kind||"client"}));
    setEvents((evs.data||[]).map(dbToEvent));
    setPunches((pcs.data||[]).map(dbToPunch));
  }catch(err){ console.error("load error",err); }
  setLoading(false);
}

async function saveEvent(){ if(!form.title.trim()||!uid) return;
  if(editing){
    const {error}=await sb.from("events").update(eventToDb(form,uid)).eq("id",editing);
    if(error){ console.error(error); return; }
    setEvents(es=>es.map(e=>e.id===editing?{...form,id:editing}:e));
  } else {
    // בנה את האירוע הבסיסי + כל המופעים החוזרים, והכנס בבת אחת
    const rows=[]; const baseRow=eventToDb(form,uid);
    const recurs=makeRecurring({...form},"tmp");
    if(recurs.length){
      // נכניס קודם את הבסיס כדי לקבל id, ואז נסמן את כל הקבוצה תחת אותו id
      const {data:baseData,error:e1}=await sb.from("events").insert(baseRow).select().single();
      if(e1){ console.error(e1); return; }
      const gid=baseData.id;
      await sb.from("events").update({recur_group_id:gid}).eq("id",gid);
      const recurRows=recurs.map(r=>({...eventToDb(r,uid),recur_group_id:gid}));
      const {data:recurData,error:e2}=await sb.from("events").insert(recurRows).select();
      if(e2){ console.error(e2); }
      const newEvs=[dbToEvent({...baseData,recur_group_id:gid}),...((recurData||[]).map(dbToEvent))];
      setEvents(es=>[...es,...newEvs]);
    } else {
      const {data,error}=await sb.from("events").insert(baseRow).select().single();
      if(error){ console.error(error); return; }
      setEvents(es=>[...es,dbToEvent(data)]);
    }
    // ניכוי כרטיסייה פעילה לאותה קטגוריה
    const ap=punches.find(p=>p.category===form.category&&(p.used||0)<p.total);
    if(ap){ const nu=(ap.used||0)+1; await sb.from("punch_cards").update({used:nu}).eq("id",ap.id); setPunches(ps=>ps.map(p=>p.id===ap.id?{...p,used:nu}:p)); }
  }
  setModal(false);
}

async function togglePay(id,e){ e&&e.stopPropagation(); const ev=events.find(x=>x.id===id); if(!ev) return; const nxt=ev.payment==="pending"?"paid":ev.payment==="paid"?"pending":ev.payment; if(nxt===ev.payment) return; setEvents(es=>es.map(x=>x.id===id?{...x,payment:nxt}:x)); const {error}=await sb.from("events").update({payment:nxt}).eq("id",id); if(error){ console.error(error); setEvents(es=>es.map(x=>x.id===id?{...x,payment:ev.payment}:x)); } }

async function savePunch(){ const name=isBiz?(C(pForm.category).id!=="?"?C(pForm.category).label:""):pForm.name; if(!name.trim()||!uid) return;
  const payload={user_id:uid,name,total:Number(pForm.total)||10,category_id:pForm.category||null,amount:pForm.amount===""?0:Number(pForm.amount)};

    const {error}=await sb.from("punch_cards").update(payload).eq("id",pEditing); if(error){ console.error(error); return; }
    setPunches(ps=>ps.map(p=>p.id===pEditing?{...p,name,total:payload.total,category:pForm.category,amount:String(payload.amount)}:p));
  } else {
    const {data,error}=await sb.from("punch_cards").insert({...payload,used:0}).select().single(); if(error){ console.error(error); return; }
    setPunches(ps=>[...ps,dbToPunch(data)]);
  }

}

function AuthScreen({lang,setLang,t,rtl}){
const [mode,setMode]=useState("login");   // login | signup | reset
const [email,setEmail]=useState("");
const [pass,setPass]=useState("");
const [busy,setBusy]=useState(false);
const [msg,setMsg]=useState(null);
const [ok,setOk]=useState(null);
const inpStyle={display:"block",width:"100%",marginBottom:10,background:"#0d0d12",border:"1px solid #252535",borderRadius:10,padding:"13px",color:"#e8e4dc",fontSize:16,boxSizing:"border-box",outline:"none",textAlign:rtl?"right":"left"};
function clearMsgs(){ setMsg(null); setOk(null); }
async function submit(){
  clearMsgs();
  if(!sb){ setMsg(lang==="he"?"לא ניתן להתחבר לשרת. בדקו חיבור אינטרנט ונסו שוב.":"Can't reach the server. Check your connection."); return; }
  if(mode==="reset"){ return submitReset(); }
  if(pass.length<6){ setMsg(t.authPassShort); return; }
  setBusy(true);
  try{
    if(mode==="signup"){
      const {data,error}=await sb.auth.signUp({email:email.trim(),password:pass});
      if(error){ setMsg(error.message.includes("already")?t.authBadCreds:error.message); }
      else if(data.session){ /* מחובר מיד */ }
      else { setOk(t.authCheckEmail); setMode("login"); }
    } else {
      const {error}=await sb.auth.signInWithPassword({email:email.trim(),password:pass});
      if(error){ setMsg(t.authBadCreds); }
    }
  }catch(e){ setMsg((e&&e.message?e.message:String(e))+" — "+t.authErr); }
  setBusy(false);
}
async function submitReset(){
  if(!email.trim()){ setMsg(t.authErr); return; }
  setBusy(true);
  try{
    const {error}=await sb.auth.resetPasswordForEmail(email.trim(),{redirectTo:window.location.href.split("#")[0].split("?")[0]});
    if(error){ setMsg(error.message); }
    else { setOk(t.authResetSent); }
  }catch(e){ setMsg((e&&e.message?e.message:String(e))); }
  setBusy(false);
}
const titleSub = mode==="login"?t.authLogin : mode==="signup"?t.authSignup : t.authReset;
return (
<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
  <div style={{position:"absolute",top:16,insetInlineEnd:16,display:"flex",gap:4}}>
    {["he","en"].map(lg=>(
      <button key={lg} onClick={()=>setLang(lg)} style={{padding:"7px 14px",borderRadius:11,border:`1px solid ${lang===lg?"#8b5ae0":"#252535"}`,background:lang===lg?"#8b5ae022":"transparent",color:lang===lg?"#8b5ae0":"#666",cursor:"pointer",fontSize:15}}>{lg==="he"?"עב":"EN"}</button>
    ))}
  </div>
  <div style={{width:"min(360px,100%)",textAlign:"center"}}>
    <div style={{width:56,height:56,borderRadius:14,background:"linear-gradient(135deg,#e05a5a,#8b5ae0)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,marginBottom:16,marginInline:"auto"}}>✦</div>
    <div style={{fontSize:22,fontWeight:800,color:"#f0ece4",marginBottom:6}}>{t.authTitle}</div>
    <div style={{fontSize:15,color:"#666",marginBottom:mode==="reset"?16:26}}>{titleSub}</div>
    {mode==="reset"&&<div style={{fontSize:14,color:"#888",marginBottom:18,lineHeight:1.5}}>{t.authResetSub}</div>}
    <input type="email" inputMode="email" autoCapitalize="none" value={email} onChange={e=>setEmail(e.target.value)} placeholder={t.authEmail} style={inpStyle}/>
    {mode!=="reset"&&(
      <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder={t.authPass} onKeyDown={e=>e.key==="Enter"&&submit()} style={{...inpStyle,marginBottom:14}}/>
    )}
    {msg&&<div style={{fontSize:14,color:"#e05a5a",marginBottom:12}}>{msg}</div>}
    {ok&&<div style={{fontSize:14,color:"#5ae09a",marginBottom:12,lineHeight:1.5}}>{ok}</div>}
    <button onClick={submit} disabled={busy||!email||(mode!=="reset"&&!pass)} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:(busy||!email||(mode!=="reset"&&!pass))?"#252535":"linear-gradient(135deg,#e05a5a,#8b5ae0)",color:(busy||!email||(mode!=="reset"&&!pass))?"#555":"#fff",cursor:(busy||!email||(mode!=="reset"&&!pass))?"default":"pointer",fontSize:16,fontWeight:700,marginBottom:14}}>{busy?t.authWait:(mode==="login"?t.authLoginBtn:mode==="signup"?t.authSignupBtn:t.authResetBtn)}</button>
    {mode==="login"&&(
      <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:2}}>
        <button onClick={()=>{setMode("reset");clearMsgs();}} style={{background:"none",border:"none",color:"#888",cursor:"pointer",fontSize:15}}>{t.authForgot}</button>
        <button onClick={()=>{setMode("signup");clearMsgs();}} style={{background:"none",border:"none",color:"#8b5ae0",cursor:"pointer",fontSize:15}}>{t.authToSignup}</button>
      </div>
    )}
    {mode==="signup"&&(
      <button onClick={()=>{setMode("login");clearMsgs();}} style={{background:"none",border:"none",color:"#8b5ae0",cursor:"pointer",fontSize:15}}>{t.authToLogin}</button>
    )}
    {mode==="reset"&&(
      <button onClick={()=>{setMode("login");clearMsgs();}} style={{background:"none",border:"none",color:"#8b5ae0",cursor:"pointer",fontSize:15}}>{t.authBackToLogin}</button>
    )}
  </div>
</div>
);
}
function ResetPasswordScreen({t,rtl,onDone}){
const [pass,setPass]=useState("");
const [busy,setBusy]=useState(false);
const [msg,setMsg]=useState(null);
const [ok,setOk]=useState(false);
async function submit(){
  setMsg(null);
  if(pass.length<6){ setMsg(t.authPassShort); return; }
  setBusy(true);
  try{
    const {error}=await sb.auth.updateUser({password:pass});
    if(error){ setMsg(error.message); }
    else { setOk(true); setTimeout(()=>onDone&&onDone(),1500); }
  }catch(e){ setMsg(e&&e.message?e.message:String(e)); }
  setBusy(false);
}
const inpStyle={display:"block",width:"100%",marginBottom:14,background:"#0d0d12",border:"1px solid #252535",borderRadius:10,padding:"13px",color:"#e8e4dc",fontSize:16,boxSizing:"border-box",outline:"none",textAlign:rtl?"right":"left"};
return (
<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
  <div style={{width:"min(360px,100%)",textAlign:"center"}}>
    <div style={{width:56,height:56,borderRadius:14,background:"linear-gradient(135deg,#e05a5a,#8b5ae0)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,marginBottom:16,marginInline:"auto"}}>✦</div>
    <div style={{fontSize:22,fontWeight:800,color:"#f0ece4",marginBottom:20}}>{t.authReset}</div>
    {ok?(
      <div style={{fontSize:16,color:"#5ae09a",lineHeight:1.6}}>{t.authPassUpdated}</div>
    ):(
      <>
        <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder={t.authNewPass} onKeyDown={e=>e.key==="Enter"&&submit()} style={inpStyle}/>
        {msg&&<div style={{fontSize:14,color:"#e05a5a",marginBottom:12}}>{msg}</div>}
        <button onClick={submit} disabled={busy||!pass} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:(busy||!pass)?"#252535":"linear-gradient(135deg,#e05a5a,#8b5ae0)",color:(busy||!pass)?"#555":"#fff",cursor:(busy||!pass)?"default":"pointer",fontSize:16,fontWeight:700}}>{busy?t.authWait:t.authUpdatePass}</button>
      </>
    )}
  </div>
</div>
);
}
function TutorialTour({steps,step,setStep,onClose,setView,labels,rtl}){
const s=steps[step];
const last=step===steps.length-1;
const [rect,setRect]=useState(null);
const cardRef=useRef(null);

// ודא שהלשונית הנכונה פתוחה לפני מדידה
useLayoutEffect(()=>{ if(s&&s.view) setView(s.view); },[step]);

// מדוד את מיקום אלמנט המטרה (וגלול אליו אם צריך)
useLayoutEffect(()=>{
  let raf1,raf2;
  function measure(){
    const el=document.getElementById(s.target);
    if(!el){ setRect(null); return; }
    const r=el.getBoundingClientRect();
    setRect({top:r.top,left:r.left,width:r.width,height:r.height});
  }
  // שתי פריימים: אחד שהתצוגה תתעדכן, אחד למדידה סופית
  raf1=requestAnimationFrame(()=>{ raf2=requestAnimationFrame(measure); });
  window.addEventListener("resize",measure);
  window.addEventListener("scroll",measure,true);
  return ()=>{ cancelAnimationFrame(raf1); cancelAnimationFrame(raf2); window.removeEventListener("resize",measure); window.removeEventListener("scroll",measure,true); };
},[step]);

const pad=8;
const vh=typeof window!=="undefined"?window.innerHeight:800;
const vw=typeof window!=="undefined"?window.innerWidth:400;
// החלט אם הכרטיס יופיע מתחת למטרה או מעליה
const below=rect?(rect.top+rect.height+pad+180<vh):true;
const cardTop=rect?(below?rect.top+rect.height+pad+6:Math.max(12,rect.top-pad-6-180)):0;

return (
<div style={{position:"fixed",inset:0,zIndex:400}}>
  {/* רקע מתכהה — לחיצה עליו לא סוגרת, כדי לא לבלבל */}
  <div style={{position:"absolute",inset:0,background:"#000a"}}/>
  {/* טבעת זוהרת סביב אלמנט המטרה */}
  {rect&&(
    <div style={{position:"absolute",top:rect.top-6,left:rect.left-6,width:rect.width+12,height:rect.height+12,borderRadius:14,border:"2px solid #8b5ae0",boxShadow:"0 0 0 9999px #000a, 0 0 22px 4px #8b5ae0aa",pointerEvents:"none",transition:"all .25s ease"}}/>
  )}
  {/* כרטיס ההסבר */}
  <div ref={cardRef} style={{position:"absolute",top:rect?cardTop:"50%",left:"50%",transform:rect?"translateX(-50%)":"translate(-50%,-50%)",width:"min(330px,calc(100vw - 32px))",background:"#161620",border:"1px solid #2a2a3a",borderRadius:18,padding:"18px 18px 16px",boxShadow:"0 12px 40px #000c",transition:"top .25s ease"}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
      <div style={{fontSize:30}}>{s.emoji}</div>
      <div style={{fontSize:17,fontWeight:800,color:"#f0ece4"}}>{s.title}</div>
    </div>
    <div style={{fontSize:15,color:"#aaa",lineHeight:1.6,marginBottom:16}}>{s.body}</div>
    <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:14}}>
      {steps.map((_,i)=>(
        <div key={i} style={{width:i===step?20:6,height:6,borderRadius:3,background:i===step?"#8b5ae0":"#2a2a3a",transition:"all .25s ease"}}/>
      ))}
    </div>
    <div style={{display:"flex",gap:8,alignItems:"center"}}>
      {step>0
        ? <button onClick={()=>setStep(step-1)} style={{padding:"11px 16px",borderRadius:11,border:"1px solid #252535",background:"transparent",color:"#888",cursor:"pointer",fontSize:15}}>{labels.back}</button>
        : <button onClick={onClose} style={{padding:"11px 16px",borderRadius:11,border:"none",background:"transparent",color:"#555",cursor:"pointer",fontSize:15}}>{labels.skip}</button>}
      <button onClick={()=>last?onClose():setStep(step+1)} style={{flex:1,padding:"11px",borderRadius:11,border:"none",background:"linear-gradient(135deg,#e05a5a,#8b5ae0)",color:"#fff",cursor:"pointer",fontSize:16,fontWeight:700}}>{last?labels.done:labels.next}</button>
    </div>
  </div>
</div>
);
}
function EvRow({ev,cat,onEdit,onPay,onDelete,showAmt,days,months,payLabel}){
const d=new Date(ev.date),c=cat(ev.category),status=ev.payment,col=PAYCOLOR[status]||PAYCOLOR.none,label=(payLabel||{})[status]||"";
return (
<div style={{background:"#111118",border:"1px solid #1c1c28",borderRadius:12,padding:"11px 13px",display:"flex",alignItems:"center",gap:11}}>
<div onClick={()=>onEdit(ev)} style={{width:38,height:38,borderRadius:10,background:c.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0,cursor:"pointer"}}>{c.emoji}</div>
<div onClick={()=>onEdit(ev)} style={{flex:1,minWidth:0,cursor:"pointer"}}>
<div style={{fontSize:15,fontWeight:600,color:"#ddd",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
{ev.recurGroupId&&<span style={{color:"#5ae09a",fontSize:11,marginInlineEnd:3}}>↻</span>}
{ev.title}
</div>
<div style={{fontSize:12,color:"#444",marginTop:2}}>{days[d.getDay()]} {d.getDate()} {months[d.getMonth()]} · {ev.time}</div>
</div>
{ev.payment!=="none"&&(
<div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flexShrink:0}}>
{showAmt&&ev.amount&&<div style={{fontSize:14,fontWeight:700,color:"#ddd"}}>{money(ev.amount,ev.currency)}</div>}
<button onClick={e=>{e.stopPropagation();onPay(ev.id,e);}} style={{padding:"5px 12px",borderRadius:9,border:`1px solid ${col}44`,background:col+"22",color:col,cursor:"pointer",fontSize:14,fontWeight:600}}>{label}</button>
</div>
)}
<button onClick={e=>{e.stopPropagation();onDelete(ev.id);}} style={{width:32,height:32,borderRadius:9,border:"1px solid #e05a5a22",background:"transparent",color:"#e05a5a55",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>🗑</button>
</div>
);
}
function SumCard({label,amount,color,emoji,sym}){
return (
<div style={{background:"#111118",border:`1px solid ${color}22`,borderRadius:14,padding:"15px 8px",textAlign:"center"}}>
<div style={{fontSize:21}}>{emoji}</div>
<div style={{fontSize:20,fontWeight:800,color,margin:"5px 0 3px"}}>{sym||"₪"}{amount.toLocaleString()}</div>
<div style={{fontSize:11,color:"#444"}}>{label}</div>
</div>
);
}
function Empty({txt}){ return <div style={{textAlign:"center",color:"#3a3a4a",padding:"32px 0",fontSize:14}}>{txt}</div>; }
const S={
navBtn:{padding:"10px 17px",borderRadius:12,border:"none",background:"#1c1c28",color:"#888",cursor:"pointer",fontSize:16,minWidth:44,transition:"all .15s ease"},
addBtn:{padding:"12px 20px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#e05a5a,#8b5ae0)",color:"#fff",cursor:"pointer",fontSize:15,fontWeight:600,transition:"all .15s ease"},
sel:{padding:"11px 15px",borderRadius:12,border:"1px solid #252535",background:"#161620",color:"#aaa",cursor:"pointer",fontSize:15,outline:"none"},
chip:{padding:"10px 16px",borderRadius:13,border:"1px solid #252535",background:"transparent",color:"#888",cursor:"pointer",fontSize:15,transition:"all .15s ease"},
lbl:{display:"block",fontSize:13,color:"#888",marginBottom:7},
inp:{display:"block",width:"100%",marginBottom:12,background:"#0d0d12",border:"1px solid #252535",borderRadius:10,padding:"14px 15px",color:"#e8e4dc",fontSize:16,boxSizing:"border-box",outline:"none"},
dt:{display:"block",width:"100%",background:"#0d0d12",border:"1px solid #252535",borderRadius:10,padding:"14px 10px",color:"#e8e4dc",fontSize:16,boxSizing:"border-box",outline:"none",direction:"ltr",textAlign:"center",minWidth:0,height:52,WebkitAppearance:"none",appearance:"none"},
circBtn:{width:38,height:38,borderRadius:10,border:"1px solid #252535",background:"transparent",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"},
};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
